<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jarvis Lite</title>

<style>

body{
    margin:0;
    background:#050816;
    color:white;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

.orb{
    width:180px;
    height:180px;
    border-radius:50%;
    margin:auto;

    background:radial-gradient(circle,#4facfe,#00f2fe);

    box-shadow:
    0 0 30px #00f2fe,
    0 0 60px #4facfe,
    0 0 100px #00f2fe;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

h1{
    margin-top:30px;
}

#status{
    color:#aaa;
    margin-top:10px;
}

button{
    margin-top:30px;
    width:220px;
    height:55px;

    border:none;
    border-radius:30px;

    font-size:18px;

    color:white;

    background:linear-gradient(
        45deg,
        #4facfe,
        #00f2fe
    );
}

</style>

</head>

<body>

<div class="container">

<div class="orb"></div>

<h1>JARVIS</h1>

<div id="status">
Ready
</div>

<button onclick="talkToJarvis()">
Talk To Jarvis
</button>

</div>

<script src="cordova.js"></script>

<script>

const apps = {

    "youtube":"com.google.android.youtube",
    "whatsapp":"com.whatsapp",
    "instagram":"com.instagram.android",
    "facebook":"com.facebook.katana",
    "messenger":"com.facebook.orca",
    "telegram":"org.telegram.messenger",
    "discord":"com.discord",
    "spotify":"com.spotify.music",
    "chrome":"com.android.chrome",
    "gmail":"com.google.android.gm",
    "maps":"com.google.android.apps.maps",
    "play store":"com.android.vending",
    "photos":"com.google.android.apps.photos",
    "drive":"com.google.android.apps.docs",
    "youtube music":"com.google.android.apps.youtube.music",
    "chatgpt":"com.openai.chatgpt",

    "free fire":"com.dts.freefireth",
    "free fire max":"com.dts.freefiremax",
    "pubg":"com.tencent.ig",
    "bgmi":"com.pubg.imobile",
    "call of duty":"com.activision.callofduty.shooter",
    "roblox":"com.roblox.client",
    "minecraft":"com.mojang.minecraftpe",
    "clash of clans":"com.supercell.clashofclans",
    "clash royale":"com.supercell.clashroyale",
    "brawl stars":"com.supercell.brawlstars",
    "subway surfers":"com.kiloo.subwaysurf",
    "among us":"com.innersloth.spacemafia",

    "phone":"com.google.android.dialer",
    "contacts":"com.android.contacts",
    "messages":"com.google.android.apps.messaging",
    "calculator":"com.google.android.calculator",
    "clock":"com.google.android.deskclock",
    "calendar":"com.google.android.calendar",
    "camera":"com.android.camera",
    "settings":"com.android.settings",
    "files":"com.google.android.documentsui"
};

document.addEventListener("deviceready", function(){

    document.getElementById("status").innerHTML =
    "Jarvis Ready";

    speak("Jarvis is online");

}, false);

function speak(text){

    if(typeof TTS !== "undefined"){

        TTS.speak({
            text:text,
            locale:"en-US",
            rate:1.0
        });

    }

}

function launchApp(packageName){

    appLauncher.launch(

        {
            packageName:packageName
        },

        function(){

            console.log("Launched");

        },

        function(){

            speak("App not installed");

            document.getElementById("status").innerHTML =
            "App not installed";

        }

    );

}

function handleCommand(command){

    if(command.startsWith("open ")){

        let appName =
        command.replace("open ","").trim();

        if(apps[appName]){

            speak("Opening " + appName);

            document.getElementById("status").innerHTML =
            "Opening " + appName;

            launchApp(apps[appName]);

        }else{

            speak("I don't know that app");

            document.getElementById("status").innerHTML =
            "Unknown app: " + appName;

        }

        return;
    }

    if(command.includes("what time")){

        let time =
        new Date().toLocaleTimeString();

        document.getElementById("status").innerHTML =
        time;

        speak("The current time is " + time);

        return;
    }

    if(command.includes("hello")){

        speak("Hello boss");

        return;
    }

    speak("Command not recognized");

}

function talkToJarvis(){

    document.getElementById("status").innerHTML =
    "Listening...";

    window.plugins.speechRecognition.startListening(

        function(matches){

            let command =
            matches[0].toLowerCase();

            document.getElementById("status").innerHTML =
            "You said: " + command;

            handleCommand(command);

        },

        function(error){

            document.getElementById("status").innerHTML =
            "Error: " + error;

        },

        {
            language:"en-US",
            matches:1
        }

    );

}

</script>

</body>
</html>
