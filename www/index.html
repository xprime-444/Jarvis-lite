<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jarvis Lite</title>

<style>

body{
    margin:0;
    background:#050816;
    color:white;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

.orb{
    width:180px;
    height:180px;
    border-radius:50%;
    margin:auto;

    background:radial-gradient(circle,#4facfe,#00f2fe);

    box-shadow:
    0 0 30px #00f2fe,
    0 0 60px #4facfe,
    0 0 100px #00f2fe;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

h1{
    margin-top:30px;
}

#status{
    color:#aaa;
    margin-top:10px;
}

button{
    margin-top:30px;
    width:220px;
    height:55px;

    border:none;
    border-radius:30px;

    font-size:18px;

    color:white;

    background:linear-gradient(
        45deg,
        #4facfe,
        #00f2fe
    );
}

</style>

</head>

<body>

<div class="container">

<div class="orb"></div>

<h1>JARVIS</h1>

<div id="status">
Ready
</div>

<button onclick="talkToJarvis()">
Talk To Jarvis
</button>

</div>

<script src="cordova.js"></script>

<script>

document.addEventListener(
    'deviceready',
    function(){

        document.getElementById(
            "status"
        ).innerHTML =
        "Cordova Ready";

    },
    false
);

function talkToJarvis(){

    document.getElementById(
        "status"
    ).innerHTML =
    "Button Pressed";

    alert(
        "Jarvis button works"
    );

}

</script>

</body>
</html>
